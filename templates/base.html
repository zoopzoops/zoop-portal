<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zoop Portal{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c12;
            --bg2: #0e1420;
            --bg3: #141c2e;
            --border: #1e2d4a;
            --accent: #3b82f6;
            --accent2: #6366f1;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --pending: #f59e0b;
            --approved: #3b82f6;
            --rejected: #ef4444;
            --downloading: #8b5cf6;
            --available: #10b981;
        }

        body.high-contrast {
            --bg: #000000;
            --bg2: #0a0a0a;
            --bg3: #111111;
            --border: #444444;
            --accent: #4d9fff;
            --accent2: #8b8fff;
            --accent-glow: rgba(77, 159, 255, 0.2);
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --text-dim: #cccccc;
            --success: #00e87a;
            --warning: #ffcc00;
            --danger: #ff4444;
            --pending: #ffcc00;
            --approved: #4d9fff;
            --rejected: #ff4444;
            --downloading: #bb88ff;
            --available: #00e87a;
        }

        body.high-contrast nav {
            background: #000000;
            border-bottom: 2px solid #444444;
        }

        body.high-contrast .card,
        body.high-contrast .stat-card {
            border-width: 2px;
        }

        body.high-contrast table th,
        body.high-contrast table td {
            border-bottom-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.06) 0%, transparent 60%);
        }

        nav {
            background: rgba(14, 20, 32, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-brand span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.15s;
            letter-spacing: 0.05em;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--bg3);
        }

        .nav-link.active {
            color: var(--accent);
            background: var(--accent-glow);
        }

        .nav-user {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .badge-pending { background: rgba(245, 158, 11, 0.1); color: var(--pending); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-approved { background: rgba(59, 130, 246, 0.1); color: var(--approved); border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-rejected { background: rgba(239, 68, 68, 0.1); color: var(--rejected); border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-downloading { background: rgba(139, 92, 246, 0.1); color: var(--downloading); border: 1px solid rgba(139, 92, 246, 0.2); }
        .badge-available { background: rgba(16, 185, 129, 0.1); color: var(--available); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-movie { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-show { background: rgba(99, 102, 241, 0.1); color: var(--accent2); border: 1px solid rgba(99, 102, 241, 0.2); }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .form-input, .form-select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            transition: border-color 0.15s;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-select option {
            background: var(--bg3);
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid rgba(30, 45, 74, 0.5);
            font-size: 0.82rem;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        .actions {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            main { padding: 1rem; }
            nav { padding: 0 1rem; }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body class="{% if user and user.high_contrast %}high-contrast{% endif %}">
    {% if request.session.get('user_id') %}
    <nav>
        <a href="/dashboard" class="nav-brand">ZOOP <span>PORTAL</span></a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">Requests</a>
            <a href="/downloads" class="nav-link {% if request.url.path == '/downloads' %}active{% endif %}">Downloads</a>
            <a href="/whats-new" class="nav-link {% if request.url.path == '/whats-new' %}active{% endif %}">What's New</a>
            {% if user and user.is_admin %}
            <a href="/admin" class="nav-link {% if request.url.path == '/admin' %}active{% endif %}">
                Admin <span id="admin-badge" style="display:none; background:var(--danger); color:white; border-radius:10px; padding:0.1rem 0.4rem; font-size:0.65rem; margin-left:0.2rem"></span>
            </a>
            {% endif %}
            <form method="post" action="/preferences/contrast" style="display:inline">
                <button type="submit" class="nav-link" style="background:none; border:1px solid var(--border); cursor:pointer; padding: 0.3rem 0.7rem;" title="Toggle high contrast">
                    {% if user and user.high_contrast %}☀ Normal{% else %}◑ Contrast{% endif %}
                </button>
            </form>
            <a href="/logout" class="nav-link">Logout</a>
            <span class="nav-user">{{ user.username if user else '' }}</span>
        </div>
    </nav>

    <script>
    let lastPendingUsers = null;
    let lastPendingRequests = null;
    let notifPermission = false;

    // Request browser notification permission
    if ("Notification" in window) {
        Notification.requestPermission().then(p => {
            notifPermission = p === "granted";
        });
    }

    function showNotification(title, body) {
        if (notifPermission) {
            new Notification(title, { body, icon: "/static/icon.png" });
        }
    }

    async function pollNotifications() {
        try {
            const res = await fetch('/api/notifications');
            const data = await res.json();

            // Kicked — redirect to login
            if (data.kicked) {
                window.location.href = '/login';
                return;
            }

            if (data.error) return;

            const { pending_users, pending_requests } = data;
            const total = (pending_users || 0) + (pending_requests || 0);

            // Update admin badge
            const badge = document.getElementById('admin-badge');
            if (badge) {
                if (total > 0) {
                    badge.textContent = total;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            }

            // Notify on new pending users
            if (lastPendingUsers !== null && pending_users > lastPendingUsers) {
                showNotification('Zoop Portal', `${pending_users - lastPendingUsers} new user registration${pending_users - lastPendingUsers > 1 ? 's' : ''} pending approval`);
            }

            // Notify on new pending requests
            if (lastPendingRequests !== null && pending_requests > lastPendingRequests) {
                showNotification('Zoop Portal', `${pending_requests - lastPendingRequests} new media request${pending_requests - lastPendingRequests > 1 ? 's' : ''} pending approval`);
            }

            lastPendingUsers = pending_users;
            lastPendingRequests = pending_requests;

        } catch (err) {
            console.error('Notification poll failed:', err);
        }
    }

    // Poll every 30 seconds
    pollNotifications();
    setInterval(pollNotifications, 30000);
    </script>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
